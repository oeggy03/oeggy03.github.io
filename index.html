<!DOCTYPE html>
<html>
  <head>
    <!-- utf8 encoding -->
    <meta charset="utf-8">

    <!-- Says that this should work on a mobile device. -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Startup</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">

    <!-- Bootstrap CSS from a CDN. This way you don't have to include the bootstrap file yourself -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    
    <!-- Your own stylesheet -->
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body>
    <!-- Telling the container to span the full length of the page. -->
    <div class="container d-flex align-items-center h-100"> 
      <div class="row">
        <header>
          <h1><strong>My personal website is still under construction :(</strong></h1>
        </header>
        <div class="buffer col-12">
        </div>
        <section class="text-center col-12">
            <hr>
            <a href="https://github.com/oeggy03"><button class="btn btn-primary btn-xl" type="submit">Check out my github instead</button></a>
        </section>
      </div>
      <!-- hr is a horizontal line -->
     
    </div>
  </body>
</html>
